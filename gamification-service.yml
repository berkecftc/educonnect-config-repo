server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: gamification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=gamification_db}
    username: ${SPRING_DATASOURCE_USERNAME:eduadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:edu123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gamification_db
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    schemas: gamification_db
    default-schema: gamification_db
    create-schemas: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    out-of-order: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:Base64:jZwU5GubnUxm1GesQMzbti2lhVckdkLpww1Awn3h0ng=}

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    flyway:
      enabled: true

logging:
  level:
    com.educonnect.gamificationservice: DEBUG
    org.springframework.amqp: INFO
